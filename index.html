<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Local app wrapper auto-redirection to compiled bundle -->
    <script>
      (function() {
        try {
          var isAtRoot = !window.location.pathname.match(/\/dist\//i);
          var isDevServer = (
            window.location.hostname.indexOf('ais-dev-') !== -1 ||
            window.location.port === '3000'
          );
          if (isAtRoot && !isDevServer) {
            window.location.replace('dist/index.html');
          }
        } catch (e) {
          console.error("Redirection failure:", e);
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guardian Protocol | Life Skill Audit</title>
    <style>
      body {
        background-color: #000000;
        margin: 0;
        color: #FFFFFF;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      
      /* Global fade out animation for loading container */
      .fade-out {
        opacity: 0;
        transition: opacity 0.5s ease-out;
        pointer-events: none;
      }

      /* Core loading screen styled to fit Project Alpha visual guidelines */
      #loader-container {
        position: fixed;
        inset: 0;
        background-color: #000000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        padding: 24px;
        box-sizing: border-box;
        text-align: center;
      }

      .hud-box {
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: rgb(8, 8, 8);
        padding: 32px 24px;
        max-width: 420px;
        width: 100%;
        box-shadow: 0 0 40px rgba(255, 255, 255, 0.05);
        border-radius: 4px;
        box-sizing: border-box;
      }

      .hud-logo {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 44px;
        height: 44px;
        background: #FFFFFF;
        color: #000000;
        font-size: 22px;
        font-weight: 800;
        border-radius: 4px;
        margin-bottom: 20px;
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        animation: pulse-glow 2s infinite ease-in-out;
      }

      @keyframes pulse-glow {
        0%, 100% { transform: scale(1); box-shadow: 0 0 12px rgba(255, 255, 255, 0.2); }
        50% { transform: scale(1.05); box-shadow: 0 0 24px rgba(255, 255, 255, 0.5); }
      }

      .hud-title {
        font-size: 13px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        margin: 0 0 6px 0;
        color: #FFFFFF;
      }

      .hud-subtitle {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: rgba(255, 255, 255, 0.4);
        margin: 0 0 24px 0;
      }

      .progress-track {
        height: 3px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
        overflow: hidden;
        margin-bottom: 16px;
        position: relative;
      }

      .progress-fill {
        height: 100%;
        width: 30%;
        background: #FFFFFF;
        box-shadow: 0 0 8px #FFFFFF;
        border-radius: 4px;
        position: absolute;
        top: 0;
        left: -30%;
        animation: load-indeterminate 1.8s infinite ease-in-out;
      }

      @keyframes load-indeterminate {
        0% { left: -30%; width: 30%; }
        50% { left: 40%; width: 45%; }
        100% { left: 100%; width: 30%; }
      }

      .status-text {
        font-family: monospace;
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: rgba(255, 255, 255, 0.6);
        margin-bottom: 4px;
        height: 14px;
        overflow: hidden;
      }

      /* Fallback diagnostics elements */
      #diagnostic-box {
        display: none;
        margin-top: 20px;
        border-top: 1px dashed rgba(255, 255, 255, 0.2);
        padding-top: 20px;
        text-align: left;
        box-sizing: border-box;
      }

      .diagnostic-header {
        font-size: 11px;
        font-weight: bold;
        color: #FF4444;
        text-transform: uppercase;
        margin-bottom: 8px;
        letter-spacing: 0.05em;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .diagnostic-log {
        font-family: monospace;
        font-size: 9px;
        background: rgba(255, 0, 0, 0.03);
        border: 1px solid rgba(255, 68, 68, 0.15);
        padding: 10px;
        border-radius: 3px;
        max-height: 110px;
        overflow-y: auto;
        color: #FF9999;
        margin-bottom: 14px;
        word-break: break-all;
        white-space: pre-wrap;
      }

      .action-btn {
        display: block;
        width: 100%;
        background: #FFFFFF;
        color: #000000;
        border: none;
        padding: 10px;
        font-size: 10px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        cursor: pointer;
        border-radius: 3px;
        transition: all 0.2s ease;
        text-decoration: none;
        text-align: center;
        box-sizing: border-box;
      }

      .action-btn:hover {
        background: rgba(230, 230, 230, 1);
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.25);
      }

      .debug-info {
        font-family: monospace;
        font-size: 8px;
        color: rgba(255, 255, 255, 0.35);
        margin-top: 8px;
        line-height: 1.4;
        word-break: break-all;
      }
    </style>
    
    <!-- Proactive error logs recorder so WebView crashes are visible instantly -->
    <script>
      window.appErrors = [];
      window.addEventListener('error', function(e) {
        var errorMsg = e.message || 'Script resolution error';
        var source = e.filename ? e.filename.split('/').pop() : 'local';
        var lineno = e.lineno || '?';
        window.appErrors.push("[" + source + " L:" + lineno + "] " + errorMsg);
        console.error('Caught error: ' + errorMsg);
      });
      window.addEventListener('unhandledrejection', function(e) {
        window.appErrors.push("[Promise Rejection] " + String(e.reason));
        console.error('Caught rejection: ' + e.reason);
      });
    </script>
  </head>
  <body>
    <!-- Immersive loading layer styled to prevent the cold black screen of blank mounts -->
    <div id="loader-container">
      <div class="hud-box">
        <div class="hud-logo">α</div>
        <div class="hud-title">Guardian Protocol</div>
        <div class="hud-subtitle">Life Skill Audit Console</div>
        
        <div class="progress-track">
          <div id="loader-bar" class="progress-fill"></div>
        </div>
        
        <div id="loader-status" class="status-text">Synchronizing systems...</div>
        
        <!-- Native WebView debug and resolution option section -->
        <div id="diagnostic-box">
          <div class="diagnostic-header">⚠️ Initialisation Failure</div>
          <div id="diagnostic-text" class="diagnostic-log">Establishing log trace...</div>
          <button type="button" class="action-btn" onclick="window.location.reload(true)">
            Force System Reload
          </button>
          <div id="debug-user-agent" class="debug-info"></div>
        </div>
      </div>
    </div>

    <!-- Main Mount Point -->
    <div id="root"></div>

    <!-- Script loading fallback handler -->
    <script>
      // Cycle helpful status messages onto the HUD so the user understands initialization steps
      var statusMessages = [
        "Connecting authorization server...",
        "Validating device profile...",
        "Securing local encryption state...",
        "Constructing core interface modules...",
        "Mounting system canvas..."
      ];
      var idx = 0;
      var statusTimer = setInterval(function() {
        var el = document.getElementById('loader-status');
        if (el) {
          el.innerText = statusMessages[idx % statusMessages.length];
          idx++;
        }
      }, 900);

      // Timeout watchdog: If React does not mount and hide the loader after 4.5 seconds,
      // unhide the Diagnostic panel and present WebView specifications with options.
      setTimeout(function() {
        var loader = document.getElementById('loader-container');
        // If loader is still running/unremoved after 4.5s
        if (loader && loader.style.display !== 'none' && !loader.classList.contains('fade-out')) {
          clearInterval(statusTimer);
          
          var statusBar = document.getElementById('loader-bar');
          if (statusBar) {
            // Turn progress bar color indicating attention is needed
            statusBar.style.background = '#FF4444';
            statusBar.style.boxShadow = '0 0 8px #FF4444';
            statusBar.style.animation = 'none';
            statusBar.style.left = '0';
            statusBar.style.width = '100%';
          }
          
          var statusText = document.getElementById('loader-status');
          if (statusText) {
            statusText.innerText = "System initialization timeout.";
            statusText.style.color = "#FF4444";
          }
          
          var diagBox = document.getElementById('diagnostic-box');
          if (diagBox) {
            diagBox.style.display = 'block';
          }
          
          // Formulate errors or module failures
          var errorsStr = "System core failed to mount.\n";
          if (window.appErrors && window.appErrors.length > 0) {
            errorsStr += "\nTRACED ISSUES:\n" + window.appErrors.join("\n");
          } else {
            errorsStr += "\nPossible cause: The device browser or application wrapper fails to load JavaScript ES modules or script imports over the network.";
          }
          
          var diagText = document.getElementById('diagnostic-text');
          if (diagText) {
            diagText.innerText = errorsStr;
          }
          
          var uaText = document.getElementById('debug-user-agent');
          if (uaText) {
            uaText.innerText = "Device Info: " + navigator.userAgent + "\nPlatform: " + navigator.platform;
          }
        }
      }, 4500);
    </script>
    
    <!-- Main bundling hook -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
